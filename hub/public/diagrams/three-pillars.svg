<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">The three pillars of AI engineering</title>
  <desc id="desc">Three overlapping circles labelled Prompt, Context, and Harness, with example techniques in each and shared work in the overlaps. Anchored in Simon Willison's framing.</desc>
  <defs>
    <style>
      :root { --fg: #1F2937; --bg: #FFFFFF; --fg-muted: #6B7280; }
      @media (prefers-color-scheme: dark) {
        :root { --fg: #E5E7EB; --bg: #0F172A; --fg-muted: #9CA3AF; }
      }
      .bg { fill: var(--bg); }
      .pillar-prompt { fill: #F59E0B; fill-opacity: 0.16; stroke: #F59E0B; stroke-width: 2; }
      .pillar-context { fill: #10B981; fill-opacity: 0.16; stroke: #10B981; stroke-width: 2; }
      .pillar-harness { fill: #6366F1; fill-opacity: 0.16; stroke: #6366F1; stroke-width: 2; }
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; fill: var(--fg); }
      .pillar-name { font-size: 24px; font-weight: 700; }
      .pillar-name-prompt { fill: #B45309; }
      .pillar-name-context { fill: #047857; }
      .pillar-name-harness { fill: #4338CA; }
      @media (prefers-color-scheme: dark) {
        .pillar-name-prompt { fill: #FCD34D; }
        .pillar-name-context { fill: #34D399; }
        .pillar-name-harness { fill: #A5B4FC; }
      }
      .pillar-body { font-size: 14px; font-weight: 400; fill: var(--fg-muted); }
      .pillar-example { font-size: 13px; font-weight: 500; }
      .overlap-label { font-size: 11px; font-weight: 600; fill: var(--fg-muted); letter-spacing: 0.3px; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="560"/>

  <!-- Title -->
  <text x="600" y="46" text-anchor="middle" style="font-size: 24px; font-weight: 700;">The three pillars of AI engineering</text>
  <text x="600" y="72" text-anchor="middle" class="pillar-body">Prompt × Context × Harness. The orthogonal axes every technique falls under.</text>

  <!-- Three overlapping circles (Venn) -->
  <!-- Prompt (top) -->
  <circle cx="600" cy="280" r="170" class="pillar-prompt"/>
  <!-- Context (bottom-left) -->
  <circle cx="495" cy="370" r="170" class="pillar-context"/>
  <!-- Harness (bottom-right) -->
  <circle cx="705" cy="370" r="170" class="pillar-harness"/>

  <!-- Pillar labels -->
  <text x="600" y="160" text-anchor="middle" class="pillar-name pillar-name-prompt">Prompt</text>
  <text x="600" y="184" text-anchor="middle" class="pillar-body">what the model sees</text>

  <text x="330" y="430" text-anchor="middle" class="pillar-name pillar-name-context">Context</text>
  <text x="330" y="454" text-anchor="middle" class="pillar-body">what surrounds it</text>

  <text x="870" y="430" text-anchor="middle" class="pillar-name pillar-name-harness">Harness</text>
  <text x="870" y="454" text-anchor="middle" class="pillar-body">what wraps the run</text>

  <!-- Example techniques in each pillar -->
  <!-- Prompt (top zone, above the other circles) -->
  <text x="600" y="230" text-anchor="middle" class="pillar-example">phrasing · examples · constraints</text>
  <text x="600" y="248" text-anchor="middle" class="pillar-example">role · output shape · refusals</text>

  <!-- Context (left zone) -->
  <text x="370" y="370" text-anchor="middle" class="pillar-example">CLAUDE.md</text>
  <text x="370" y="388" text-anchor="middle" class="pillar-example">skills</text>
  <text x="370" y="406" text-anchor="middle" class="pillar-example">connectors</text>

  <!-- Harness (right zone) -->
  <text x="820" y="370" text-anchor="middle" class="pillar-example">hooks · permissions</text>
  <text x="820" y="388" text-anchor="middle" class="pillar-example">subagents · worktrees</text>
  <text x="820" y="406" text-anchor="middle" class="pillar-example">eval pipelines</text>

  <!-- Overlap callouts -->
  <text x="475" y="290" text-anchor="middle" class="overlap-label">PROMPT × CONTEXT</text>
  <text x="475" y="306" text-anchor="middle" class="pillar-body" style="font-size: 12px;">few-shot examples</text>

  <text x="725" y="290" text-anchor="middle" class="overlap-label">PROMPT × HARNESS</text>
  <text x="725" y="306" text-anchor="middle" class="pillar-body" style="font-size: 12px;">tool definitions</text>

  <text x="600" y="408" text-anchor="middle" class="overlap-label">ALL THREE</text>
  <text x="600" y="424" text-anchor="middle" class="pillar-body" style="font-size: 12px;">a shipped skill</text>

  <!-- Footer attribution -->
  <text x="600" y="525" text-anchor="middle" class="pillar-body">Tag every technique against one pillar. See G.1, B.7, C.3.</text>
</svg>
