name: PMG Proxy Verification

on:
  workflow_dispatch:

jobs:
  malicious-package-blocked:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PMG proxy
        uses: safedep/pmg@v1
        with:
          server-mode: true
          api-key: ${{ secrets.PMG_PUBLIC_REPOS_TOKEN }}
          tenant-id: ${{ secrets.PMG_TENANT_ID }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Attempt to install known-malicious test package
        id: malicious_install
        continue-on-error: true
        run: npm install --no-save safedep-test-pkg@0.1.3

      - name: Verify malicious package was blocked
        run: |
          if [ "${{ steps.malicious_install.outcome }}" = "success" ]; then
            echo "PMG failed to block safedep-test-pkg@0.1.3"
            exit 1
          fi
          echo "PMG correctly blocked safedep-test-pkg@0.1.3"

      - name: Enforce PMG policy
        if: always()
        run: pmg proxy stop --fail-on-violation

  clean-install-succeeds:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PMG proxy
        uses: safedep/pmg@v1
        with:
          server-mode: true
          api-key: ${{ secrets.PMG_PUBLIC_REPOS_TOKEN }}
          tenant-id: ${{ secrets.PMG_TENANT_ID }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: hub/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: hub

      - name: Enforce PMG policy
        if: always()
        run: pmg proxy stop --fail-on-violation
