name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: hub/package-lock.json

      - name: Setup PMG proxy
        uses: safedep/pmg@v1
        with:
          server-mode: true
          api-key: ${{ secrets.PMG_PUBLIC_REPOS_TOKEN }}
          tenant-id: ${{ secrets.PMG_TENANT_ID }}

      - name: Install dependencies
        run: npm ci
        working-directory: hub

      - name: Build site
        run: npm run build
        working-directory: hub
        env:
          ASTRO_SITE: "https://razorpay.github.io"
          ASTRO_BASE: "/ai-playbook"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: hub/dist

      - name: Enforce PMG policy
        if: always()
        run: pmg proxy stop --fail-on-violation

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
