name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pr-preview-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: hub/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: hub

      - name: Build preview
        run: npm run build
        working-directory: hub
        env:
          ASTRO_SITE: "https://razorpay.github.io"
          ASTRO_BASE: "/ai-playbook/pr-preview/pr-${{ github.event.number }}"

      - name: Deploy preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: hub/dist
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: deploy

  cleanup-preview:
    if: github.event.action == "closed"
    runs-on: [non-api, linux-amd64]
    steps:
      - uses: actions/checkout@v4

      - name: Remove preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: hub/dist
          preview-branch: gh-pages
          umbrella-dir: pr-previey
          action: remove
